services:
  gluetun:
    container_name: tightarse-gluetun
    image: qmcgaw/gluetun
    cap_add:
      - NET_ADMIN
    env_file:
      - .env
    environment:
      - VPN_SERVICE_PROVIDER=privado
      - SERVER_COUNTRIES=Australia
      - HTTPPROXY=on
    ports:
      - "8888:8888"
    restart: unless-stopped

  app:
    container_name: tightarse
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - tightarse_data:/data
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Australia/Brisbane
    ports:
      - "7382:7382"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7382/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 15s

volumes:
  tightarse_data:
    name: tightarse_data
